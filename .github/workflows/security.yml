name: Security

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  vice-audit:
    name: VICE Security Audit
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run VICE audit
        uses: ./
